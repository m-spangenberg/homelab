---
kube_vip_image: ghcr.io/kube-vip/kube-vip:v0.8.2
containerd_sandbox_image: registry.k8s.io/pause:3.10
kubernetes_packages:
  - kubeadm
  - kubelet
  - kubectl
kubernetes_apt_key_url: https://pkgs.k8s.io/core:/stable:/{{ kubernetes_major_minor }}/deb/Release.key
kubernetes_apt_repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_major_minor }}/deb/ /"
primary_control_plane: "{{ groups['kube_control_plane'][0] }}"
control_plane_endpoint: "{{ api_virtual_ip }}:{{ api_server_port }}"
