---
- name: Ensure kernel modules are configured
  copy:
    dest: /etc/modules-load.d/kubernetes.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Load kernel modules immediately
  command: modprobe {{ item }}
  changed_when: false
  loop:
    - overlay
    - br_netfilter

- name: Configure sysctl for Kubernetes networking
  copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl settings
  command: sysctl --system
  changed_when: false

- name: Disable swap immediately
  command: swapoff -a
  changed_when: false

- name: Disable swap in fstab
  replace:
    path: /etc/fstab
    regexp: '^(?!#)(.+\s+swap\s+.+)$'
    replace: '# \1'

- name: Install bootstrap dependencies
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - containerd
      - curl
      - gpg
      - jq
    update_cache: true
    state: present

- name: Ensure apt keyring directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Kubernetes apt signing key
  get_url:
    url: "{{ kubernetes_apt_key_url }}"
    dest: /tmp/kubernetes-apt-keyring.asc
    mode: '0644'

- name: Add Kubernetes apt signing key
  command: >-
    gpg --dearmor
    -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    /tmp/kubernetes-apt-keyring.asc
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Remove temporary Kubernetes apt signing key
  file:
    path: /tmp/kubernetes-apt-keyring.asc
    state: absent

- name: Configure Kubernetes apt repository
  copy:
    dest: /etc/apt/sources.list.d/kubernetes.list
    mode: '0644'
    content: |
      {{ kubernetes_apt_repo }}

- name: Install Kubernetes packages
  apt:
    name: "{{ kubernetes_packages }}"
    update_cache: true
    state: present

- name: Hold Kubernetes packages
  dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kubernetes_packages }}"

- name: Generate default containerd configuration if missing
  shell: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- name: Enable systemd cgroups in containerd
  replace:
    path: /etc/containerd/config.toml
    regexp: '^\s*SystemdCgroup = false$'
    replace: '            SystemdCgroup = true'

- name: Pin containerd sandbox image
  replace:
    path: /etc/containerd/config.toml
    regexp: '^\s*sandbox_image = ".+"$'
    replace: '    sandbox_image = "{{ containerd_sandbox_image }}"'

- name: Restart and enable containerd
  systemd:
    name: containerd
    enabled: true
    state: restarted

- name: Enable kubelet
  systemd:
    name: kubelet
    enabled: true
    state: started

- name: Ensure kubelet manifests directory exists
  file:
    path: /etc/kubernetes/manifests
    state: directory
    mode: '0755'

- name: Create kube-vip static pod manifest on control plane nodes
  when: inventory_hostname in groups['kube_control_plane']
  template:
    src: kube-vip-static-pod.yaml.j2
    dest: /etc/kubernetes/manifests/kube-vip.yaml
    mode: '0644'

- name: Check whether node is already part of the cluster
  stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Render kubeadm init configuration
  when:
    - inventory_hostname == primary_control_plane
    - not kubelet_conf.stat.exists
  template:
    src: kubeadm-init-config.yaml.j2
    dest: /tmp/kubeadm-init-config.yaml
    mode: '0600'

- name: Initialize the first control plane node
  when:
    - inventory_hostname == primary_control_plane
    - not kubelet_conf.stat.exists
  command: kubeadm init --config /tmp/kubeadm-init-config.yaml --upload-certs
  register: kubeadm_init

- name: Ensure kubeconfig is available for the Ansible user
  when: inventory_hostname in groups['kube_control_plane']
  block:
    - name: Ensure kubeconfig directory exists
      file:
        path: "{{ '/root/.kube' if ansible_user == 'root' else '/home/' ~ ansible_user ~ '/.kube' }}"
        state: directory
        mode: '0700'

    - name: Copy admin kubeconfig
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ '/root/.kube/config' if ansible_user == 'root' else '/home/' ~ ansible_user ~ '/.kube/config' }}"
        remote_src: true
        mode: '0600'

- name: Generate shared join command on the primary control plane
  when: inventory_hostname == primary_control_plane
  command: kubeadm token create --print-join-command
  register: kubeadm_join_command
  changed_when: false
  no_log: true

- name: Upload control plane certificates and capture certificate key
  when: inventory_hostname == primary_control_plane
  shell: kubeadm init phase upload-certs --upload-certs | tail -n 1
  register: kubeadm_certificate_key
  changed_when: false
  no_log: true

- name: Join additional control plane nodes
  when:
    - inventory_hostname in groups['kube_control_plane']
    - inventory_hostname != primary_control_plane
    - not kubelet_conf.stat.exists
  shell: >-
    {{ hostvars[primary_control_plane].kubeadm_join_command.stdout }}
    --control-plane
    --apiserver-advertise-address {{ management_ip }}
    --certificate-key {{ hostvars[primary_control_plane].kubeadm_certificate_key.stdout }}
  args:
    creates: /etc/kubernetes/kubelet.conf
  no_log: true

- name: Join worker nodes
  when:
    - inventory_hostname in groups['kube_workers']
    - not kubelet_conf.stat.exists
  shell: >-
    {{ hostvars[primary_control_plane].kubeadm_join_command.stdout }}
    --node-name {{ inventory_hostname }}
  args:
    creates: /etc/kubernetes/kubelet.conf
  no_log: true

- name: Wait for API server on the primary control plane
  when: inventory_hostname == primary_control_plane
  wait_for:
    host: "{{ api_virtual_ip }}"
    port: "{{ api_server_port }}"
    timeout: 300

- name: Annotate nodes with Longhorn default disk config
  when:
    - inventory_hostname == primary_control_plane
    - groups['kubernetes'] is defined
  loop: "{{ groups['kubernetes'] }}"
  loop_control:
    loop_var: cluster_node
  shell: >-
    kubectl --kubeconfig /etc/kubernetes/admin.conf annotate node {{ cluster_node }}
    node.longhorn.io/default-disks-config='{{ hostvars[cluster_node].storage_disks | to_json }}'
    --overwrite
  changed_when: false