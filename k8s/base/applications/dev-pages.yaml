---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pages
  namespace: apps-web
spec:
  minAvailable: 1
  selector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - site-page
          - blog-page
          - status-page
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-page
  namespace: apps-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    traefik.ingress.kubernetes.io/router.middlewares: traefik-force-https@kubernetescrd,traefik-default-security-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - site.domain.tld
      secretName: site-page-tls
  rules:
    - host: site.domain.tld
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: site-page
                port:
                  number: 80
---
