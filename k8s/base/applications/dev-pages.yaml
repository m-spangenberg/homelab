apiVersion: v1
kind: ConfigMap
metadata:
  name: page-site-content
  namespace: apps-web
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Site</title>
      <style>
        body { font-family: sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #d6f5e8, #e7eefc); color: #16334d; }
        main { padding: 3rem; background: rgba(255,255,255,0.85); border-radius: 1rem; box-shadow: 0 1rem 2rem rgba(22,51,77,0.12); }
      </style>
    </head>
    <body><main><h1>site.domain.tld</h1><p>GitOps-managed landing page.</p></main></body>
    </html>
---
