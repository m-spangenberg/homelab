apiVersion: v1
kind: ConfigMap
metadata:
  name: page-status-content
  namespace: apps-web
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Status</title>
      <style>
        body { font-family: sans-serif; margin: 0; min-height: 100vh; display: grid; place-items: center; background: linear-gradient(135deg, #d8f1f7, #edf8f5); color: #0f4c5c; }
        main { padding: 3rem; background: rgba(255,255,255,0.9); border-radius: 1rem; box-shadow: 0 1rem 2rem rgba(15,76,92,0.12); }
      </style>
    </head>
    <body><main><h1>status.domain.tld</h1><p>User-facing validation endpoint for worker drains and node replacement.</p></main></body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-page
  namespace: apps-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: site-page
  template:
    metadata:
      labels:
        app: site-page
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: site-page
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
          volumeMounts:
            - name: content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: content
          configMap:
            name: page-site-content
---
