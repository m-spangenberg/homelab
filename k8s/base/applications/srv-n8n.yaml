apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: n8n-config
  namespace: apps-utility
spec:
  encryptedData:
    DB_POSTGRESDB_HOST: AgReplaceWithKubesealCiphertext
    DB_POSTGRESDB_PORT: AgReplaceWithKubesealCiphertext
    DB_POSTGRESDB_DATABASE: AgReplaceWithKubesealCiphertext
    DB_POSTGRESDB_USER: AgReplaceWithKubesealCiphertext
    DB_POSTGRESDB_PASSWORD: AgReplaceWithKubesealCiphertext
    N8N_ENCRYPTION_KEY: AgReplaceWithKubesealCiphertext
  template:
    metadata:
      name: n8n-config
      namespace: apps-utility
    type: Opaque
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: apps-utility
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn-replicated
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: apps-utility
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
        - name: n8n
          image: docker.n8n.io/n8nio/n8n:1.86.1
          ports:
            - containerPort: 5678
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: DB_POSTGRESDB_HOST
            - name: DB_POSTGRESDB_PORT
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: DB_POSTGRESDB_PORT
            - name: DB_POSTGRESDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: DB_POSTGRESDB_DATABASE
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: DB_POSTGRESDB_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: DB_POSTGRESDB_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-config
                  key: N8N_ENCRYPTION_KEY
            - name: N8N_HOST
              value: n8n.domain.tld
            - name: N8N_PROTOCOL
              value: https
            - name: WEBHOOK_URL
              value: https://n8n.domain.tld/
            - name: TZ
              value: Africa/Windhoek
          readinessProbe:
            httpGet:
              path: /
              port: 5678
          livenessProbe:
            tcpSocket:
              port: 5678
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.n8n
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: n8n-data
---
apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: apps-utility
spec:
  selector:
    app: n8n
  ports:
    - name: http
      port: 80
      targetPort: 5678
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: apps-utility
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    traefik.ingress.kubernetes.io/router.middlewares: traefik-force-https@kubernetescrd,traefik-default-security-headers@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - n8n.domain.tld
      secretName: n8n-tls
  rules:
    - host: n8n.domain.tld
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n
                port:
                  number: 80
