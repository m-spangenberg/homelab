apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-metallb
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: 0.14.8
    helm:
      values: |
        controller:
          podDisruptionBudget:
            enabled: true
            minAvailable: 1
        speaker:
          frr:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-longhorn
  namespace: argocd
spec:
  project: platform
  source:
    repoURL: https://charts.longhorn.io
    chart: longhorn
    targetRevision: 1.7.2
    helm:
      values: |
        persistence:
          defaultClass: true
          defaultClassReplicaCount: 3
          reclaimPolicy: Retain
        defaultSettings:
          defaultReplicaCount: 3
          defaultDataPath: /var/lib/longhorn
          backupTarget: s3://longhorn@homelab-backups/dev
          backupTargetCredentialSecret: longhorn-backup-target
          replicaAutoBalance: best-effort
          storageOverProvisioningPercentage: 150
          storageMinimalAvailablePercentage: 15
  destination:
    server: https://kubernetes.default.svc
    namespace: longhorn-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
