  labels:
    network-role: shared-services
---
apiVersion: v1
kind: Namespace
metadata:
  name: cache
  labels:
    network-role: shared-services
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-platform-default-deny
  namespace: data-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: data-platform-allow-apps-and-dns
  namespace: data-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network-role: applications
        - namespaceSelector:
            matchLabels:
              network-role: shared-services
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
