apiVersion: v1
kind: Namespace
metadata:
  name: data-platform
  labels:
    network-role: shared-services
---
apiVersion: v1
kind: Namespace
metadata:
  name: streaming
  labels:
    network-role: shared-services
---
apiVersion: v1
kind: Namespace
metadata:
  name: nosql
  labels:
    network-role: shared-services
---
apiVersion: v1
